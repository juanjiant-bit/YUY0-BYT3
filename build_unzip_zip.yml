name: Build UF2 from ZIP

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
      PROJECT_ZIP: bytebeat_machine_full_fixed_repo.zip
      PROJECT_DIR: project_src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            git \
            python3 \
            unzip

      - name: Verify ZIP exists
        run: |
          test -f "$PROJECT_ZIP"
          ls -lah "$PROJECT_ZIP"

      - name: Unzip project
        run: |
          rm -rf "$PROJECT_DIR"
          mkdir -p "$PROJECT_DIR"
          unzip -q "$PROJECT_ZIP" -d "$PROJECT_DIR"
          find "$PROJECT_DIR" -maxdepth 2 | sort | head -200
          test -f "$PROJECT_DIR/CMakeLists.txt"

      - name: Clone Pico SDK
        run: |
          git clone --depth 1 --branch 2.1.0 https://github.com/raspberrypi/pico-sdk.git
          cd pico-sdk
          git submodule update --init --depth 1

      - name: Configure
        run: |
          cmake -S "$PROJECT_DIR" -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPICO_BOARD=pico

      - name: Build
        run: cmake --build build --parallel

      - name: Verify outputs
        run: |
          ls -lah build
          test -f build/bytebeat_machine.uf2
          test -f build/bytebeat_machine.elf
          test -f build/bytebeat_machine.bin
          test -f build/bytebeat_machine.hex

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bytebeat_machine_firmware
          path: |
            build/bytebeat_machine.uf2
            build/bytebeat_machine.elf
            build/bytebeat_machine.bin
            build/bytebeat_machine.hex
            build/bytebeat_machine.dis
          if-no-files-found: error
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: bytebeat_machine_firmware
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bytebeat_machine.uf2
            dist/bytebeat_machine.elf
            dist/bytebeat_machine.bin
            dist/bytebeat_machine.hex
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
